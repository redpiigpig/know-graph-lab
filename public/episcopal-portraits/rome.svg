<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 430" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fef2f2"/>
      <stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
  </defs>
  <rect width="350" height="430" fill="url(#bgR)"/>

  <!-- Halo -->
  <circle cx="175" cy="195" r="78" fill="#fde68a" opacity="0.45"/>
  <circle cx="175" cy="195" r="78" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>

  <!-- Shoulders / chasuble (red) -->
  <path d="M 70 430 L 90 290 Q 175 260 260 290 L 280 430 Z" fill="#b91c1c"/>
  <path d="M 175 280 L 175 430" stroke="#fef2f2" stroke-width="3" opacity="0.6"/>

  <!-- Pallium (white Y-shape) -->
  <path d="M 145 295 L 175 340 L 205 295" fill="none" stroke="#fef9c3" stroke-width="6"/>
  <line x1="175" y1="340" x2="175" y2="410" stroke="#fef9c3" stroke-width="6"/>

  <!-- Face silhouette -->
  <ellipse cx="175" cy="215" rx="38" ry="48" fill="#fde7c0"/>

  <!-- Beard / shadow -->
  <path d="M 142 230 Q 175 280 208 230" fill="#e8c896" opacity="0.5"/>

  <!-- Triple tiara (papal crown, 3 tiers) -->
  <path d="M 130 175 L 220 175 L 215 165 L 135 165 Z" fill="#fbbf24" stroke="#a16207" stroke-width="1.2"/>
  <path d="M 135 165 L 215 165 L 210 145 L 140 145 Z" fill="#fbbf24" stroke="#a16207" stroke-width="1.2"/>
  <path d="M 140 145 L 210 145 L 205 125 L 145 125 Z" fill="#fbbf24" stroke="#a16207" stroke-width="1.2"/>
  <!-- Tiara crown decorations -->
  <circle cx="175" cy="170" r="3" fill="#dc2626"/>
  <circle cx="155" cy="170" r="2.5" fill="#fef9c3"/>
  <circle cx="195" cy="170" r="2.5" fill="#fef9c3"/>
  <circle cx="175" cy="150" r="3" fill="#dc2626"/>
  <circle cx="175" cy="130" r="2.5" fill="#dc2626"/>
  <!-- Top cross + orb -->
  <circle cx="175" cy="115" r="5" fill="#fbbf24" stroke="#a16207" stroke-width="1.2"/>
  <line x1="175" y1="115" x2="175" y2="100" stroke="#a16207" stroke-width="2"/>
  <line x1="170" y1="106" x2="180" y2="106" stroke="#a16207" stroke-width="2"/>
  <!-- Lappets -->
  <rect x="130" y="178" width="6" height="40" fill="#fbbf24" stroke="#a16207" stroke-width="0.8"/>
  <rect x="214" y="178" width="6" height="40" fill="#fbbf24" stroke="#a16207" stroke-width="0.8"/>

  <!-- Footer label -->
  <rect x="0" y="395" width="350" height="35" fill="#dc2626" opacity="0.92"/>
  <text x="175" y="418" text-anchor="middle" font-family="Noto Serif TC, serif" font-size="13" fill="#fff" letter-spacing="3">羅馬公教 · 通用主教肖像</text>
</svg>
