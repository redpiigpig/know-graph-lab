<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 430" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#eff6ff"/>
      <stop offset="1" stop-color="#bfdbfe"/>
    </linearGradient>
  </defs>
  <rect width="350" height="430" fill="url(#bgC)"/>

  <!-- Halo -->
  <circle cx="175" cy="195" r="80" fill="#fde68a" opacity="0.5"/>
  <circle cx="175" cy="195" r="80" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.7"/>

  <!-- Shoulders / sakkos (blue/gold) -->
  <path d="M 65 430 L 88 290 Q 175 258 262 290 L 285 430 Z" fill="#1d4ed8"/>
  <!-- Sakkos gold pattern -->
  <path d="M 88 290 Q 175 258 262 290" fill="none" stroke="#fbbf24" stroke-width="3"/>
  <path d="M 100 350 Q 175 335 250 350" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  <!-- Cross on chest (omophorion) -->
  <path d="M 155 305 L 175 350 L 195 305" fill="none" stroke="#fef9c3" stroke-width="5"/>
  <line x1="175" y1="350" x2="175" y2="410" stroke="#fef9c3" stroke-width="5"/>
  <!-- Byzantine cross on chest -->
  <g transform="translate(175,380)" stroke="#fbbf24" stroke-width="2" fill="none">
    <line x1="-6" y1="-8" x2="6" y2="-8"/>
    <line x1="-8" y1="0" x2="8" y2="0"/>
    <line x1="-5" y1="8" x2="5" y2="8"/>
    <line x1="0" y1="-12" x2="0" y2="12"/>
  </g>

  <!-- Face -->
  <ellipse cx="175" cy="215" rx="38" ry="48" fill="#fde7c0"/>
  <!-- Long Orthodox beard -->
  <path d="M 142 235 Q 175 320 208 235 Q 200 270 175 285 Q 150 270 142 235" fill="#6b7280" opacity="0.85"/>

  <!-- Byzantine mitra (onion-dome shaped, gold w/ jewels) -->
  <path d="M 125 175 Q 125 165 135 160 Q 138 130 175 115 Q 212 130 215 160 Q 225 165 225 175 L 220 185 L 130 185 Z" fill="#fbbf24" stroke="#a16207" stroke-width="1.5"/>
  <!-- Mitra rim -->
  <rect x="125" y="175" width="100" height="8" fill="#a16207"/>
  <!-- Mitra icons / jewels -->
  <circle cx="155" cy="155" r="6" fill="#fef2f2" stroke="#a16207" stroke-width="1"/>
  <circle cx="155" cy="155" r="3" fill="#dc2626"/>
  <circle cx="195" cy="155" r="6" fill="#fef2f2" stroke="#a16207" stroke-width="1"/>
  <circle cx="195" cy="155" r="3" fill="#1d4ed8"/>
  <circle cx="175" cy="140" r="6" fill="#fef2f2" stroke="#a16207" stroke-width="1"/>
  <circle cx="175" cy="140" r="3" fill="#16a34a"/>
  <!-- Top cross -->
  <line x1="175" y1="115" x2="175" y2="95" stroke="#a16207" stroke-width="2.5"/>
  <line x1="167" y1="100" x2="183" y2="100" stroke="#a16207" stroke-width="2.5"/>
  <line x1="170" y1="108" x2="180" y2="108" stroke="#a16207" stroke-width="2"/>

  <!-- Footer -->
  <rect x="0" y="395" width="350" height="35" fill="#2563eb" opacity="0.92"/>
  <text x="175" y="418" text-anchor="middle" font-family="Noto Serif TC, serif" font-size="13" fill="#fff" letter-spacing="3">希臘正教 · 通用主教肖像</text>
</svg>
