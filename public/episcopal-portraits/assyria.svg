<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 430" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgZ" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="350" height="430" fill="url(#bgZ)"/>

  <!-- Halo -->
  <circle cx="175" cy="210" r="78" fill="#fde68a" opacity="0.4"/>
  <circle cx="175" cy="210" r="78" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.5"/>

  <!-- Robe (deep maroon, Assyrian Catholicos color) -->
  <path d="M 65 430 L 90 305 Q 175 275 260 305 L 285 430 Z" fill="#7f1d1d"/>
  <!-- Trim -->
  <path d="M 90 305 Q 175 275 260 305" fill="none" stroke="#fbbf24" stroke-width="2.5"/>

  <!-- Assyrian Church of the East cross (small triangular flares, "Khdaita" cross) -->
  <g transform="translate(175,355)" fill="#fbbf24" stroke="#7f1d1d" stroke-width="1">
    <!-- vertical bar -->
    <path d="M -2,-18 L 2,-18 L 4,-2 L 18,0 L 4,2 L 2,18 L -2,18 L -4,2 L -18,0 L -4,-2 Z"/>
  </g>

  <!-- Face -->
  <ellipse cx="175" cy="230" rx="38" ry="48" fill="#e8c896"/>
  <!-- Beard -->
  <path d="M 142 250 Q 175 335 208 250 Q 195 290 175 300 Q 155 290 142 250" fill="#374151"/>

  <!-- Assyrian black wrapped turban with cross (Patriarchal headdress) -->
  <ellipse cx="175" cy="195" rx="58" ry="22" fill="#1f2937"/>
  <path d="M 117 195 Q 117 145 175 130 Q 233 145 233 195 Z" fill="#1f2937"/>
  <!-- Turban folds (lighter lines) -->
  <path d="M 130 165 Q 175 145 220 165" fill="none" stroke="#4b5563" stroke-width="1.2"/>
  <path d="M 125 180 Q 175 160 225 180" fill="none" stroke="#4b5563" stroke-width="1.2"/>
  <!-- Front cross -->
  <g transform="translate(175,165)" stroke="#fbbf24" stroke-width="2.5" fill="none">
    <line x1="0" y1="-9" x2="0" y2="9"/>
    <line x1="-7" y1="0" x2="7" y2="0"/>
  </g>
  <!-- Wrap edge trim -->
  <line x1="117" y1="190" x2="233" y2="190" stroke="#fbbf24" stroke-width="1.5" opacity="0.7"/>

  <!-- Footer -->
  <rect x="0" y="395" width="350" height="35" fill="#475569" opacity="0.92"/>
  <text x="175" y="418" text-anchor="middle" font-family="Noto Serif TC, serif" font-size="13" fill="#fff" letter-spacing="3">亞述景教 · 通用主教肖像</text>
</svg>
