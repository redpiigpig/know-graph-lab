<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 350 430" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bgT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ecfeff"/>
      <stop offset="1" stop-color="#a5f3fc"/>
    </linearGradient>
  </defs>
  <rect width="350" height="430" fill="url(#bgT)"/>

  <!-- Halo -->
  <circle cx="175" cy="200" r="78" fill="#fde68a" opacity="0.45"/>
  <circle cx="175" cy="200" r="78" fill="none" stroke="#d97706" stroke-width="1.5" opacity="0.6"/>

  <!-- Robe (black w/ red trim, Syriac style) -->
  <path d="M 65 430 L 90 295 Q 175 265 260 295 L 285 430 Z" fill="#1f2937"/>
  <path d="M 90 295 Q 175 265 260 295" fill="none" stroke="#dc2626" stroke-width="2.5"/>

  <!-- Syriac cross pectoral (Aramaic Malka cross w/ flares) -->
  <g transform="translate(175,345)" stroke="#0e7490" stroke-width="2.5" fill="#fff">
    <path d="M 0,-18 L 3,-3 L 18,0 L 3,3 L 0,18 L -3,3 L -18,0 L -3,-3 Z"/>
  </g>

  <!-- Face -->
  <ellipse cx="175" cy="220" rx="38" ry="48" fill="#e8c896"/>
  <!-- Pointed Syriac beard -->
  <path d="M 142 240 Q 165 305 175 320 Q 185 305 208 240 Q 195 285 175 295 Q 155 285 142 240" fill="#374151"/>

  <!-- Syriac masnafto / monastic hood (black w/ embroidered crosses) -->
  <path d="M 130 130 Q 175 110 220 130 L 225 175 Q 225 195 215 200 L 135 200 Q 125 195 125 175 Z" fill="#1f2937"/>
  <!-- 13 small crosses on hood (commemorating Christ + 12 apostles) -->
  <g fill="#fef9c3" font-family="serif" font-size="9" text-anchor="middle">
    <text x="175" y="145">✚</text>
    <text x="158" y="150">✚</text>
    <text x="192" y="150">✚</text>
    <text x="145" y="160">✚</text>
    <text x="205" y="160">✚</text>
    <text x="138" y="175">✚</text>
    <text x="212" y="175">✚</text>
    <text x="158" y="183">✚</text>
    <text x="192" y="183">✚</text>
    <text x="175" y="190">✚</text>
  </g>
  <!-- Hood bottom trim -->
  <line x1="125" y1="195" x2="225" y2="195" stroke="#dc2626" stroke-width="2"/>

  <!-- Footer -->
  <rect x="0" y="395" width="350" height="35" fill="#0891b2" opacity="0.92"/>
  <text x="175" y="418" text-anchor="middle" font-family="Noto Serif TC, serif" font-size="13" fill="#fff" letter-spacing="3">敘利亞正教 · 通用主教肖像</text>
</svg>
