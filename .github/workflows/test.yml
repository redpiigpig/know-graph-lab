name: tests
# 只手動觸發：push/PR 自動跑會在每次 commit 失敗時寄 email（且 CI 缺 package-lock.json
# 一直 fail），而本機 pre-push hook 已跑全套 vitest，雲端這份是重複的。
# 想手動跑：GitHub → Actions → tests → Run workflow。
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx nuxi prepare
      - run: npm run test:run
